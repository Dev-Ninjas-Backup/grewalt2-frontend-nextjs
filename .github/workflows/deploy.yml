name: CI/CD Pipeline

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm ci

      - name: Build Next.js
        run: npm run build

      # Docker build
      - name: Build Docker Image
        run: docker build -t nextjs-app .

      # Example: push to Docker Hub
      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASS }}" | docker login -u "${{ secrets.DOCKER_USER }}" --password-stdin

      - name: Tag Image
        run: docker tag nextjs-app ${{ secrets.DOCKER_USER }}/nextjs-app:latest

      - name: Push Image
        run: docker push ${{ secrets.DOCKER_USER }}/nextjs-app:latest